# SOPET Admin CI
# Triggers on every pull request (any base branch): open, update, reopen, ready for review.
# Runs: yarn type-check → yarn test → yarn build → yarn test:e2e

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3002/graphql
      GRAPHQL_SCHEMA_PATH: sopet-backend/src/schema.gql

    steps:
      - name: Checkout admin
        uses: actions/checkout@v4

      - name: Checkout backend schema
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/new-sopet-backend
          path: sopet-backend
          sparse-checkout: |
            src/schema.gql
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Format check
        run: yarn format:check

      - name: Type check
        run: yarn type-check

      - name: Unit tests
        run: yarn test

      - name: Build
        run: yarn build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: yarn test:e2e
